<tr>
  <td class="folder-path">{{ folder.path }}</td>
  <td class="folder-meta">
    {% if folder.last_processed_at %}
      {{ folder.last_processed_at|date:"Y-m-d H:i" }}
    {% else %}
      <span style="color: #ccc;">Never</span>
    {% endif %}
  </td>
  <td class="folder-meta">
    {% if folder.last_checked_at %}
      {{ folder.last_checked_at|date:"Y-m-d H:i" }}
    {% else %}
      <span style="color: #ccc;">Never</span>
    {% endif %}
  </td>
  <td class="folder-actions">
    <button
      class="btn-update"
      onclick="openBrowserModal({{ folder.folder_id }}, '{{ folder.path|escapejs }}')"
    >Update Path</button>
    <form method="post" action="{% url 'library-folder-delete' folder.folder_id %}" style="display: inline;">
      {% csrf_token %}
      <button
        type="submit"
        class="btn-remove"
        onclick="return confirm('Remove this folder from the library?')"
      >Remove</button>
    </form>
  </td>
</tr>
